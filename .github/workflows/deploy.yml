name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 03:12 UTC.
    - cron: '12 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate daily snapshot
        env:
          NODE_ENV: production
        run: npm run snapshot:daily

      - name: Build site
        env:
          NODE_ENV: production
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./build
          force_orphan: true
